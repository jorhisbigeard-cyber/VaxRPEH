<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Banni — Vax RP</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:2rem;gap:1rem">
  <div style="font-size:5rem">🔨</div>
  <h1 style="font-size:2rem;color:var(--danger)">Tu as été banni</h1>
  <p id="ban-reason" style="color:var(--text-muted);max-width:400px;line-height:1.7"></p>
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.5rem;max-width:400px;width:100%">
    <div style="font-size:0.8rem;color:var(--text-muted);margin-bottom:0.5rem">Banni par</div>
    <div id="ban-by" style="font-weight:600"></div>
    <div style="font-size:0.8rem;color:var(--text-muted);margin-top:0.75rem;margin-bottom:0.25rem">Date</div>
    <div id="ban-date" style="font-size:0.9rem"></div>
  </div>
  <p style="font-size:0.85rem;color:var(--text-muted)">Si tu penses que c'est une erreur, contacte un administrateur sur Discord.</p>
</div>
<script>
fetch('/api/mon-ban').then(r => r.json()).then(b => {
  document.getElementById('ban-reason').textContent = b.raison || 'Aucune raison précisée.';
  document.getElementById('ban-by').textContent = b.bannePar || 'Staff';
  document.getElementById('ban-date').textContent = new Date(b.date).toLocaleDateString('fr-FR', {day:'2-digit',month:'long',year:'numeric'});
}).catch(() => location.href = '/');
</script>
</body>
</html>

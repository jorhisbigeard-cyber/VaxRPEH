<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Banni — Vax RP</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .banni-wrap { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; text-align:center; padding:2rem 1rem; gap:1rem; }
    .banni-icon { font-size:clamp(3.5rem,12vw,5rem); }
    .banni-title { font-size:clamp(1.5rem,5vw,2rem); color:var(--danger); font-weight:800; }
    .banni-reason { color:var(--text-muted); max-width:380px; line-height:1.7; font-size:0.95rem; }
    .banni-box { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.5rem; max-width:380px; width:100%; text-align:left; }
    .banni-box-row { margin-bottom:0.75rem; }
    .banni-box-row:last-child { margin-bottom:0; }
    .banni-box-label { font-size:0.78rem; color:var(--text-muted); margin-bottom:0.2rem; }
    .banni-box-value { font-weight:600; font-size:0.95rem; }
    .banni-note { font-size:0.82rem; color:var(--text-muted); max-width:380px; line-height:1.6; }
    @media (max-width:480px) { .banni-wrap { padding:1.5rem 0.9rem; gap:0.75rem; } .banni-box { padding:1.1rem; } }
  </style>
</head>
<body>
<div class="banni-wrap">
  <div class="banni-icon">🔨</div>
  <h1 class="banni-title">Tu as été banni</h1>
  <p class="banni-reason" id="ban-reason"></p>
  <div class="banni-box">
    <div class="banni-box-row">
      <div class="banni-box-label">Banni par</div>
      <div class="banni-box-value" id="ban-by"></div>
    </div>
    <div class="banni-box-row">
      <div class="banni-box-label">Date</div>
      <div class="banni-box-value" id="ban-date"></div>
    </div>
  </div>
  <p class="banni-note">Si tu penses que c'est une erreur, contacte un administrateur sur Discord.</p>
  <a href="index.html" class="btn-secondary" style="margin-top:0.5rem">Retour à l'accueil</a>
</div>
<script>
fetch('/api/mon-ban').then(r => r.json()).then(b => {
  document.getElementById('ban-reason').textContent = b.raison || 'Aucune raison précisée.';
  document.getElementById('ban-by').textContent = b.bannePar || 'Staff';
  document.getElementById('ban-date').textContent = new Date(b.date).toLocaleDateString('fr-FR', {day:'2-digit',month:'long',year:'numeric'});
}).catch(() => location.href = '/');
</script>
</body>
</html>
